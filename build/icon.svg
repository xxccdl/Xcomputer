<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#79c0ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#58a6ff" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 背景圆角方形 -->
  <rect x="64" y="64" width="896" height="896" rx="224" ry="224" fill="url(#bg)" stroke="#30363d" stroke-width="3"/>

  <!-- 光晕 -->
  <ellipse cx="512" cy="400" rx="300" ry="200" fill="url(#glow)"/>

  <!-- X 字母 — 两条交叉线条 -->
  <g filter="url(#shadow)">
    <!-- 左上到右下 -->
    <line x1="280" y1="280" x2="744" y2="744" stroke="url(#xGrad)" stroke-width="80" stroke-linecap="round"/>
    <!-- 右上到左下 -->
    <line x1="744" y1="280" x2="280" y2="744" stroke="url(#xGrad)" stroke-width="80" stroke-linecap="round"/>
  </g>

  <!-- 四角装饰点 -->
  <circle cx="280" cy="280" r="16" fill="#58a6ff" opacity="0.8"/>
  <circle cx="744" cy="280" r="16" fill="#58a6ff" opacity="0.8"/>
  <circle cx="280" cy="744" r="16" fill="#58a6ff" opacity="0.8"/>
  <circle cx="744" cy="744" r="16" fill="#58a6ff" opacity="0.8"/>

  <!-- 四角小点 -->
  <circle cx="280" cy="280" r="6" fill="#fff" opacity="0.9"/>
  <circle cx="744" cy="280" r="6" fill="#fff" opacity="0.9"/>
  <circle cx="280" cy="744" r="6" fill="#fff" opacity="0.9"/>
  <circle cx="744" cy="744" r="6" fill="#fff" opacity="0.9"/>

  <!-- 边框高亮线 -->
  <rect x="64" y="64" width="896" height="896" rx="224" ry="224" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.3"/>
</svg>
